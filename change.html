<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无药可救 · 蠢商巅峰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: repeating-linear-gradient(45deg, #ff4d4d, #ff4d4d 40px, #ff8080 40px, #ff8080 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Impact', 'Arial Black', 'PingFang SC', cursive;
            padding: 2rem;
            overflow-x: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,22 2,13" fill="%23ffdd88" stroke="black"/><text x="10" y="18" font-size="14">🤡</text></svg>') 12 5, auto;
        }
        .crazy-card {
            max-width: 800px;
            width: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 5rem;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), 0 0 0 8px #ffdd99, 0 0 0 12px #ff8800;
            padding: 2rem 1.8rem 3rem;
            text-align: center;
            animation: shakeCard 0.5s infinite alternate ease-in-out;
            transform-origin: center;
        }
        @keyframes shakeCard {
            0% { transform: rotate(0deg) translateX(0); }
            100% { transform: rotate(2deg) translateX(4px); }
        }
        .hopeless-text {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffec00, #ffb347, #ff3d3d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 6px 6px 0px #aa2e00, 12px 12px 20px rgba(0,0,0,0.3);
            letter-spacing: 4px;
            margin: 1rem 0;
            word-break: break-word;
            animation: pulseGlow 0.8s infinite alternate;
        }
        @keyframes pulseGlow {
            from { text-shadow: 2px 2px 0px #ff6600, 0 0 5px yellow; }
            to { text-shadow: 8px 8px 0px #cc3300, 0 0 20px #ffcc00; }
        }
        .sub-mad {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff3a0;
            background: #000000aa;
            display: inline-block;
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            margin: 20px 0;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .emoji-storm {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 2rem 0;
            font-size: 4rem;
            filter: drop-shadow(0 8px 12px black);
            animation: bounceAll 1s infinite ease;
        }
        .emoji-storm span {
            display: inline-block;
        }
        @keyframes bounceAll {
            0%,100%{ transform: translateY(0px);}
            50%{ transform: translateY(-15px);}
        }
        .certificate {
            background: #f9e7b3;
            border: 8px ridge #ffaa33;
            border-radius: 2rem;
            padding: 1rem;
            margin: 1.5rem 0;
            font-family: 'Comic Sans MS', cursive;
            transform: rotate(-1deg);
        }
        .certificate h3 {
            font-size: 1.8rem;
            color: #b33c00;
        }
        .certificate p {
            font-size: 1.2rem;
            color: #5a2e00;
        }
        .btn-home {
            background: linear-gradient(120deg, #ffae5a, #ff7b2c);
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 7px 0 #913d00;
            transition: 0.07s linear;
            margin-top: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #913d00;
        }
        .music-tip {
            background: #1f1a10b3;
            font-size: 0.8rem;
            color: #ffd58c;
            border-radius: 30px;
            padding: 5px 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .blink-bg {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 60%, rgba(255,200,0,0.2));
            animation: blinkFlash 1.2s infinite;
            z-index: 0;
        }
        @keyframes blinkFlash {
            0% { opacity: 0; }
            100% { opacity: 0.4; }
        }
        footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #ffe3aa;
        }
        @media (max-width: 600px) {
            .hopeless-text {
                font-size: 2rem;
            }
            .sub-mad {
                font-size: 1.2rem;
            }
            .emoji-storm {
                font-size: 2.5rem;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="blink-bg"></div>
<div class="crazy-card">
    <div class="hopeless-text">
        💀 当你进入这个界面<br>就真的无可救药了 💀
    </div>
    <div class="sub-mad">
        🤡 蠢商突破大气层 🤡
    </div>
    <div class="emoji-storm">
        <span>🤪</span><span>🥴</span><span>😵‍💫</span><span>🤡</span><span>💩</span><span>🐔</span><span>🍉</span><span>🐕</span>
    </div>
    <div class="certificate">
        <h3>🏆 蠢王认证 · 官方盖戳 🏆</h3>
        <p>经FQ国际蠢商协会鉴定：您已成功解锁「无药可救·史诗级」称号</p>
        <p>🎉 恭喜您成为朋友圈整蛊素材永久VIP 🎉</p>
        <small style="color:#aa5500">* 该证书无法通过任何方式撤销，包括但不限于后悔、摔手机、吃西瓜。</small>
    </div>
    <a href="index.html" class="btn-home">🏠 逃回首页 · 重新做人 🏠</a>
    <div class="music-tip" id="musicControlBtn">
        🎵 魔性BGM循环中 🔊 点击静音/播放
    </div>
    <footer>
        ⚠️ 友情提示：你已经无药可救，但听歌可以快乐加倍 ~ 整蛊专用，笑一笑十年少
    </footer>
</div>

<audio id="bgmAudio" loop preload="auto">
    <!-- 主要使用可靠的在线滑稽音乐链接（pixabay 公开音频） -->
    <source src="assets/zongcisheng_dj.mp3" type="audio/mpeg">
    
</audio>

<script>
    (function() {
        const audio = document.getElementById('bgmAudio');
        const musicBtn = document.getElementById('musicControlBtn');
        let isPlaying = false;

        // 设置音量适中
        audio.volume = 0.5;
        audio.loop = true;

        // 尝试自动播放：检查 sessionStorage 中是否有 allowAutoPlay 标记（由 intro.html 设置）
        const allowAutoPlay = sessionStorage.getItem('allowAutoPlay') === 'true';
        
        function startPlayback() {
            audio.play().then(() => {
                isPlaying = true;
                musicBtn.innerHTML = '🎵 魔性BGM循环中 🔊 点击静音/播放';
            }).catch(err => {
                console.warn("自动播放失败:", err);
                musicBtn.innerHTML = '🔇 BGM被拦截 · 点击我唤醒整蛊音乐 🎵';
                isPlaying = false;
            });
        }

        if (allowAutoPlay) {
            // 由于用户从 intro 点击跳转，属于有用户激活的上下文，大概率成功
            startPlayback();
            // 清除标记，避免刷新页面再次自动播放（可选）
            sessionStorage.removeItem('allowAutoPlay');
        } else {
            // 没有标记时，显示提示，等待用户点击按钮再播放
            musicBtn.innerHTML = '🎵 点击播放整蛊BGM 🎵';
        }

        // 手动控制播放/暂停
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                startPlayback();
            } else {
                audio.pause();
                isPlaying = false;
                musicBtn.innerHTML = '🔇 BGM已静音 🎧 点击恢复魔性';
            }
        });

        // 页面卸载时清除定时器（飘浮字符用）
        let intervalId = null;
        
        // 整蛊飘浮特效
        const style = document.createElement('style');
        style.textContent = `
            .floating-chun {
                position: fixed;
                pointer-events: none;
                font-size: 2rem;
                font-weight: bold;
                color: #ffd966;
                text-shadow: 0 0 5px red;
                z-index: 9999;
                animation: floatUp 3s ease-out forwards;
            }
            @keyframes floatUp {
                0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                100% { transform: translateY(-200px) rotate(30deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        function createFloatingChar() {
            const chars = ['蠢', '🤡', '💊', '🐔', '🍉', '💩', '🃏'];
            const span = document.createElement('div');
            span.className = 'floating-chun';
            span.textContent = chars[Math.floor(Math.random() * chars.length)];
            span.style.left = Math.random() * window.innerWidth + 'px';
            span.style.top = window.innerHeight - 50 + 'px';
            span.style.fontSize = (Math.random() * 30 + 24) + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 3000);
        }
        
        intervalId = setInterval(createFloatingChar, 1500);
        
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
        });

        // 控制台彩蛋
        console.log("%c 🚨 警告！你已经无药可救，蠢商突破天际！但是开心最重要 🚨", "color: #ff6600; font-size: 20px; font-weight: bold; -webkit-text-stroke: 1px black;");
        console.log("%c 🎉 欢迎来到蠢商地狱，快分享给你的朋友一起快乐整蛊 🎉", "color: #ffcc00; font-size: 14px;");
    })();
</script>
</body>
</html>
